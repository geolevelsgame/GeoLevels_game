openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GeoLevels geography quiz API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leaderboard
    description: Leaderboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard entries
      description: Returns top 20 scores filtered by mode and region
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [classic, daily]
            default: classic
          description: Game mode filter
        - name: region
          in: query
          required: false
          schema:
            type: string
            enum: [all, africa, asia, europe, americas, oceania]
            default: all
          description: Region filter (ignored for daily mode)
        - name: daily_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Date string (YYYY-MM-DD) for daily mode filter
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: submitLeaderboardEntry
      tags: [leaderboard]
      summary: Submit a score to the leaderboard
      description: Posts a player's score after completing a quiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaderboardEntryInput"
      responses:
        "201":
          description: Score submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardEntryCreated"
        "400":
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LeaderboardEntry:
      type: object
      properties:
        id:
          type: integer
        playerName:
          type: string
        score:
          type: integer
        correct:
          type: integer
        total:
          type: integer
        maxCombo:
          type: integer
        region:
          type: string
        mode:
          type: string
        dailyDate:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - playerName
        - score
        - correct
        - total
        - maxCombo
        - region
        - mode
        - createdAt

    LeaderboardEntryInput:
      type: object
      properties:
        playerName:
          type: string
          minLength: 1
          maxLength: 20
        score:
          type: integer
          minimum: 0
        correct:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 1
        maxCombo:
          type: integer
          minimum: 0
          default: 0
        region:
          type: string
          default: all
        mode:
          type: string
          enum: [classic, daily]
          default: classic
        dailyDate:
          type: string
          nullable: true
      required:
        - playerName
        - score
        - correct
        - total

    LeaderboardResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
      required:
        - entries

    LeaderboardEntryCreated:
      type: object
      properties:
        entry:
          $ref: "#/components/schemas/LeaderboardEntry"
      required:
        - entry

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - error
